# ============================================================
#  MythicBlades — Skills Configuration
#  Reload in-game with /mb reload (no restart needed)
#
#  damage        : base damage dealt
#  radius        : AoE radius in blocks
#  range         : projectile/slash range in blocks
#  width         : slash width in blocks
#  cooldown      : seconds
#  duration      : seconds (for channelled abilities)
#  multiplier    : damage multiplier for special conditions
#
#  Particle names: https://hub.spigotmc.org/javadocs/spigot/org/bukkit/Particle.html
#  Set any particle to NONE to disable it.
# ============================================================

# ── BLADE OF THAW (Singularity) ──────────────────────────────
blade_of_thaw:
  passive:
    slow_amplifier: 1          # Slowness level on hit (0 = Slowness I)
    slow_duration: 40          # ticks
  glacial_monolith:
    damage: 45.0
    radius: 6.0
    cooldown: 5
    spike_range: 10.0
    wave_radius: 20.0
    resistance_amplifier: 4
    resistance_duration: 60
  sentinels:
    counter_damage: 15.0
    slow_amplifier: 3
    slow_duration: 60
    xp_drain_per_second: 1
    orbit_radius: 1.8
    count: 6
  absolute_zero:
    cooldown_minutes: 10
    meltdown_duration: 15      # seconds
  particles:
    aura_primary: SNOWFLAKE
    aura_secondary: END_ROD
    aura_primary_count: 4
    aura_secondary_count: 1
    impact_primary: SNOWFLAKE
    impact_secondary: END_ROD
    impact_primary_count: 30
    impact_secondary_count: 15
    sentinel_orbit: END_ROD
    projectile: SNOWFLAKE

